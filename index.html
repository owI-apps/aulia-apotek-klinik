<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- Tag khusus agar bisa full screen di iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aulia App">
    <title>Apotek & Klinik Aulia</title>
    
    <!-- Tailwind CSS CDN dengan Konfigurasi Custom Warna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#f0f9ff', 100:'#e0f2fe', 200:'#bae6fd', 300:'#7dd3fc', 400:'#38bdf8', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1', 800:'#075985', 900:'#0c4a6e' },
                        accent: { 50:'#f0fdf4', 100:'#dcfce7', 500:'#22c55e', 600:'#16a34a', 700:'#15803d' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-full bg-slate-50 dark:bg-slate-900 text-gray-800 dark:text-gray-200">

    <div class="flex h-full">
        <!-- SIDEBAR -->
        <!-- FIX: Ditambah h-full dan overflow-y-auto agar bisa scroll di HP -->
        <aside id="sidebar" class="hidden lg:flex flex-col w-64 h-full bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 transition-colors duration-200 overflow-y-auto">
            
            <!-- Logo Area -->
            <div class="h-16 flex items-center gap-3 px-6 border-b border-slate-200 dark:border-slate-700 flex-shrink-0">
                <img src="icon-192.png" alt="Logo" class="w-8 h-8 rounded-lg">
                <div>
                    <h1 class="font-bold text-primary-600 dark:text-primary-400 text-sm leading-tight">Aulia</h1>
                    <p class="text-[10px] text-slate-400 dark:text-slate-500">Clinic & Pharmacy</p>
                </div>
            </div>

            <!-- Menu Navigation -->
            <nav class="flex-1 overflow-y-auto p-4 space-y-6 text-sm" id="sidebar-menu">
                <!-- Diisi oleh JS app.js berdasarkan Role -->
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- TOP NAVBAR -->
            <header class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-6 sticky top-0 z-30 flex-shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleMobileSidebar()" class="lg:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h2 id="page-title" class="font-semibold text-lg">Dashboard</h2>
                </div>
                
                <div class="flex items-center gap-3">
                    <!-- Toggle Dark Mode -->
                    <button onclick="toggleTheme()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-yellow-400"></i>
                        <i data-lucide="moon" class="w-5 h-5 block dark:hidden text-slate-600"></i>
                    </button>
                    <!-- User Info -->
                    <div class="flex items-center gap-2 pl-3 border-l border-slate-200 dark:border-slate-600">
                        <div class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900 text-primary-600 dark:text-primary-300 flex items-center justify-center font-bold text-xs" id="user-avatar">A</div>
                        <div class="hidden sm:block">
                            <p class="text-xs font-medium leading-tight" id="user-name">Admin</p>
                            <p class="text-[10px] text-slate-400" id="user-role">Keuangan</p>
                        </div>
                    </div>
                    <button onclick="AppAuth.logout()" class="p-2 text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition" title="Logout">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- PAGE CONTENT -->
            <main class="flex-1 overflow-y-auto p-6" id="app-content">
                <div class="flex justify-center py-20"><div class="spinner"></div></div>
            </main>
        </div>
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden" onclick="toggleMobileSidebar()"></div>

    <!-- Library untuk baca Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/auth.js"></script>
    <!-- Library Export Excel & PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Script Utama App -->
    <script src="js/app.js"></script>
    
    <!-- Registrasi Service Worker untuk PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW reg failed: ', err));
        });
      }
    </script>
</body>
</html>
